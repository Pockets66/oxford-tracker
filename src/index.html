<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oxford Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
</head>
<body>

  <!-- Top bar -->
  <header id="topbar">
    <span id="app-title">Oxford Tracker</span>

    <nav id="tab-nav">
      <button class="tab-btn" data-tab="characters">Characters</button>
      <button class="tab-btn" data-tab="scenes">Scenes</button>
      <button class="tab-btn" data-tab="plotlines">Plotlines</button>
      <button class="tab-btn" data-tab="factions">Factions</button>
      <button class="tab-btn" data-tab="anomalies">Anomalies</button>
    </nav>

    <button id="theme-toggle" title="Toggle theme">&#9790;</button>
    <button id="settings-btn" title="Settings">&#9881;</button>
  </header>

  <!-- Error banner -->
  <div id="error-banner" role="alert">
    <span id="error-text"></span>
    <button id="banner-dismiss">Dismiss</button>
  </div>

  <!-- Main content -->
  <main id="main"></main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
